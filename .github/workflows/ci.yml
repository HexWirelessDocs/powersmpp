name: ci
on:
  push:
    branches:
      - master
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install mkdocs-material mkdocs-encryptcontent-plugin
      - name: Inject passwords
        env:
          MKDOCS_PASSWORD: ${{ secrets.MKDOCS_PASSWORD }}
          MKDOCS_USER_PASSWORD: ${{ secrets.MKDOCS_USER_PASSWORD }}
        run: |
          find docs -name "*.md" -exec sed -i "s/INJECT_ADMIN_PASSWORD/$MKDOCS_PASSWORD/g" {} +
          find docs -name "*.md" -exec sed -i "s/INJECT_USER_PASSWORD/$MKDOCS_USER_PASSWORD/g" {} +
      - run: mkdocs gh-deploy --force